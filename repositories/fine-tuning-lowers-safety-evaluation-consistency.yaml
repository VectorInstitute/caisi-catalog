name: fine-tuning-lowers-safety-evaluation-consistency
repo_id: null
description: "This CAISI project shows that fine-tuning a general-purpose LLM degrades its safety alignment even when the fine-tuning data contains no harmful content, and investigates how robust safety benchmarking is to seemingly inconsequential variations in the experimental setup. Across 150 fine-tuned model checkpoints (two base models, two fine-tuning datasets), the authors find substantial variance in safety scores due to random seed, generation temperature, and number of fine-tuning epochs, and show that 'non-refusal' and 'toxicity' are distinct concepts that should both be measured. The findings have implications for how safety evaluation results should be reported to enable meaningful comparisons."
