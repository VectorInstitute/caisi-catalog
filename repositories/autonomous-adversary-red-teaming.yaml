name: autonomous-adversary-red-teaming
repo_id: null
description: "This CAISI project studies Language Model Agents (LMAs) as a primitive for augmenting red-team operations, including attack planning, adversary emulation, and multi-step lateral movement central to advanced persistent threat (APT) campaigns. Using MITRE ATT&CK, the work benchmarks LMAs across two lateral-movement scenarios in a controlled adversary-emulation environment, comparing fully autonomous execution, self-scaffolded planning, and expert-defined action plans, with outcomes verified via an LLM-as-a-Judge paradigm. This entry provides the two benchmark scenario datasets released alongside the paper."
