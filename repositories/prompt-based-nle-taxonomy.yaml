name: prompt-based-nle-taxonomy
repo_id: null
description: "An updated taxonomy for Natural Language Explanations (NLEs) generated by prompting large language models, adapted from the Explainable AI (XAI) literature to support AI governance. The taxonomy spans three dimensions: Context (task, data, audience, goals), Generation and Presentation (generation methods, inputs, interactivity, outputs, forms), and Evaluation (content, presentation, and user-centered properties, plus evaluation setting). It is intended as a framework for researchers, auditors, and policymakers to characterize, design, and improve NLEs for transparent AI systems."
