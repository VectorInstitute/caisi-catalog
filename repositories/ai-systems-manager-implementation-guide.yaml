name: ai-systems-manager-implementation-guide
repo_id: null
description: "This guide helps managers of AI systems implement Canada's Voluntary Code of Conduct on the Responsible Development and Management of Advanced Generative AI Systems. It provides granular, actionable practices aligned with five of the Code's six principles (Safety, Accountability, Human Oversight & Monitoring, Transparency, and Validity & Robustness), covering risk assessment, incident response, monitoring for harmful use, AI disclosure to users, and cybersecurity testing, along with a repository of related international standards and frameworks (ISO/IEC 42001, NIST AI RMF, OECD tools, EU AI Office resources, and others)."
