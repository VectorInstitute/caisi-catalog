description: "AI Safety Radar is an autogenerated daily digest of AI safety and security developments. It pulls from nine source types (AI Safety Institutes, arXiv, peer-reviewed journals, AI lab blogs, RSS feeds, Hacker News, GitHub activity, and more), summarizes them with Claude, and publishes a bilingual, searchable static site with an RSS feed and a weekly cross-source synthesis."
