name: algorithmic-impact-assessment
repo_id: canada-ca/aia-eia-js
description: "The Algorithmic Impact Assessment (AIA) is a mandatory risk-assessment questionnaire that supports the Government of Canada's Directive on Automated Decision-Making. It scores an automated decision system across risk areas (project, system, algorithm, decision, impact, data) and mitigation areas (consultations, de-risking measures) to determine one of four impact levels, which in turn set the governance, transparency, and human-oversight requirements the system must meet."
