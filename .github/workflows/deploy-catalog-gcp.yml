name: Deploy CAISI Catalog (Cloud Run)

on:
  push:
    branches:
      - main
    paths:
      - 'catalog/**'
      - 'repositories/**'
      - 'scripts/sync_repositories_to_json.py'
      - '.github/workflows/deploy-catalog-gcp.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Collect GitHub Metrics"]
    types:
      - completed
    branches:
      - main

env:
  PROJECT_ID: coderd
  GAR_LOCATION: us-central1
  REPOSITORY: catalog
  SERVICE_NAME: caisi-catalog
  REGION: us-central1

permissions:
  contents: read
  id-token: write

concurrency:
  group: "cloud-run-caisi-catalog"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.11"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: uv pip install --system pyyaml

      - name: Sync YAML repositories to JSON
        run: python scripts/sync_repositories_to_json.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          if ! gcloud artifacts repositories describe ${{ env.REPOSITORY }} \
            --location=${{ env.GAR_LOCATION }} --format="get(name)" 2>/dev/null; then
            gcloud artifacts repositories create ${{ env.REPOSITORY }} \
              --repository-format=docker \
              --location=${{ env.GAR_LOCATION }} \
              --description="Docker repository for Catalog services"
          fi

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          docker build \
            -t "$IMAGE" \
            --cache-from type=gha,scope=${{ env.SERVICE_NAME }} \
            --cache-to type=gha,mode=max,scope=${{ env.SERVICE_NAME }} \
            catalog/

          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ steps.build.outputs.image }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60s \
            --max-instances=5 \
            --min-instances=0 \
            --concurrency=80 \
            --port=8080 \
            --update-labels="deployed-by=github-actions,commit=${{ github.sha }}" \
            --quiet

          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## CAISI Catalog Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
